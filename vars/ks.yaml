apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: vars
  namespace: flux-system
spec:
  interval: 10m
  path: ./vars/${TENANT_NAMESPACE}
  prune: true
  sourceRef:
    kind: GitRepository
    name: tenant-repos
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: replacements
  decryption:
    provider: sops
    secretRef:
      name: sops-age