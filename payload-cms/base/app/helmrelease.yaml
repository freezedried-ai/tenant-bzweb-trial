apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: payload-cms
spec:
  chart:
    spec:
      chart: app-template
      version: 3.3.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
  values:
    image:
      repository: payloadcms/payload
      tag: "3.15.0"
      pullPolicy: IfNotPresent
    service:
      main:
        ports:
          http:
            port: 3000
    ingress:
      main:
        enabled: false
    env:
      - name: PAYLOAD_SECRET
        valueFrom:
          secretKeyRef:
            name: replacement
            key: payloadSecret
      - name: DATABASE_URL
        value: postgresql://payload:${POSTGRES_PASSWORD}@postgres-postgresql:5432/payload
      - name: PAYLOAD_PUBLIC_SERVER_URL
        value: ${PAYLOAD_PUBLIC_SERVER_URL}
      - name: PAYLOAD_PUBLIC_SITE_URL
        value: ${PAYLOAD_PUBLIC_SITE_URL}
      - name: PAYLOAD_CONFIG_PATH
        value: /app/payload.config.ts
      - name: NODE_ENV
        value: production
      - name: PORT
        value: "3000"
    persistence:
      enabled: true
      storageClass: ocs-storagecluster-cephfs
      size: 5Gi
      mountPath: /app/uploads
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "1Gi"
        cpu: "500m"
    serviceAccount:
      create: true
      name: payload-cms-sa